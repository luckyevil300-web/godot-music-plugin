name: Build Plugin AAR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permissão ao Gradle
        run: chmod +x gradlew

      - name: Compilar plugin Release
        run: ./gradlew :plugin:assembleRelease --stacktrace

      - name: Preparar artefato
        run: |
          mkdir -p output
          cp plugin/build/outputs/aar/plugin-release.aar output/GodotMusicPlugin.aar
          ls -lh output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GodotMusicPlugin
          path: output/GodotMusicPlugin.aar
          retention-days: 30

      - name: Criar Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: output/GodotMusicPlugin.aar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
